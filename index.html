<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <title>Chromalchemy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <link
      rel="stylesheet"
      href="style.css" />

    <script
      src="libraries/ntc.js"
      defer></script>

    <script
      src="script.js"
      defer></script>
  </head>
  <body>
    <dialog
      id="discovery-modal"
      class="modal">
      <div class="modal-box flex flex-col items-center text-center max-w-sm">
        <h3 class="text-2xl font-bold mb-2">New Color Discovered!</h3>

        <!-- discovered color cube-->
        <div
          id="modal-color-box"
          class="w-24 h-24 rounded-2xl my-4 shadow-xl border-4 border-white/10 transition-transform hover:scale-105"></div>

        <!-- color name-->
        <p
          id="modal-color-name"
          class="text-xl font-semibold mb-4"></p>

        <!-- close-->
        <div class="modal-action w-full justify-center">
          <form method="dialog">
            <button class="btn btn-primary px-8">Awesome!</button>
          </form>
        </div>
      </div>

      <form
        method="dialog"
        class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <div
      id="app"
      class="flex h-screen 100vh">
      <main
        id="workspace"
        class="flex-1 relative"></main>
      <aside
        id="sidebar"
        class="w-75 overflow-y-auto border-2">
        <h3>Merge Colors!</h3>
        <div id="color-menu"></div>
      </aside>
    </div>
  </body>
</html>
