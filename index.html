<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />

    <title>Chromalchemy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <link
      rel="stylesheet"
      href="style.css" />

    <script
      src="libraries/ntc.js"
      defer></script>

    <script
      src="script.js"
      defer></script>
  </head>
  <body>
    <dialog
      id="discovery-modal"
      class="modal">
      <div class="modal-box flex flex-col items-center text-center max-w-sm">
        <h3 class="text-2xl font-bold mb-2">New Color Discovered!</h3>

        <!-- discovered color cube-->
        <div
          id="modal-color-box"
          class="w-24 h-24 rounded-2xl my-4 shadow-xl border-4 border-white/10 transition-transform hover:scale-105"></div>

        <!-- color name-->
        <p
          id="modal-color-name"
          class="text-xl font-semibold mb-4"></p>

        <!-- close-->
        <div class="modal-action w-full justify-center">
          <form method="dialog">
            <button class="btn btn-primary px-8">Awesome!</button>
          </form>
        </div>
      </div>

      <form
        method="dialog"
        class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <div
      id="app"
      class="flex h-screen 100vh">
      <div class="flex flex-col gap-2 ml-4 mt-4 items-start">
        <button
          id="clear-workspace-btn"
          class="btn btn-sm btn-error btn-outline hover:scale-105">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          Clear workspace
        </button>

        <button
          id="theme-toggle-btn"
          class="btn btn-sm btn-outline hover:scale-105">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          Toggle theme
        </button>
      </div>

      <div
        class="absolute bottom-4 left-4 z-20 border border-base-300 px-4 py-2 rounded-2xl flex items-center gap-3 pointer-events-none">
        <div
          class="font-mono font-bold pointer-events-auto"
          id="progress-text">
          0 / 999
        </div>
      </div>

      <main
        id="workspace"
        class="flex-1 relative bottom-2"></main>
      <aside
        id="sidebar"
        class="w-100 bg-base-200 border-l border-base-300 p-4 flex flex-col gap-4 overflow-y-auto">
        <h3 class="text-xl font-extrabold tracking-wide ml-2 text-center">
          Merge Colors!
        </h3>

        <div id="color-menu"></div>
      </aside>
    </div>
  </body>
</html>
